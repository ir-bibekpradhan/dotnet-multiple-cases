# Scenario 4: Cached packages (GitHub Actions cache)
# First run: cache miss — proxy sees all NuGet downloads
# Second run: cache hit — proxy should see NO downloads (packages served from cache)
# Expected: validates proxy correctly reports 0 packages on cache hit runs

name: "Scenario 4 - Cached packages"

on:
  workflow_dispatch:

jobs:
  restore-with-cache:
    runs-on: ubuntu-latest

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
      # ============= InvisiRisk Setup End =============
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        id: nuget-cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/App.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache status
        run: |
          echo "Cache hit: ${{ steps.nuget-cache.outputs.cache-hit }}"

      - name: Restore packages (offline if cached)
        working-directory: src/App
        run: |
          if [ "${{ steps.nuget-cache.outputs.cache-hit }}" == "true" ]; then
            echo "Cache hit — disabling all remote sources for offline restore"
            cat > /tmp/nuget-offline.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
            </packageSources>
          </configuration>
          EOF
            dotnet restore --configfile /tmp/nuget-offline.config
          else
            echo "Cache miss — restoring from NuGet (network)"
            dotnet restore
          fi

      - name: Build
        working-directory: src/App
        run: dotnet build -c Release --no-restore
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
