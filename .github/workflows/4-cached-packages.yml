# Scenario 4: Cached packages (GitHub Actions cache)
# First run: cache miss — proxy sees all NuGet downloads
# Second run: cache hit — proxy should see NO downloads (packages served from cache)
# Expected: validates proxy correctly reports 0 packages on cache hit runs

name: "Scenario 4 - Cached packages"

on:
  workflow_dispatch:

jobs:
  restore-with-cache:
    runs-on: ubuntu-latest

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
      # ============= InvisiRisk Setup End =============
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (with built-in NuGet cache)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: src/App/App.csproj

      - name: Restore packages
        working-directory: src/App
        run: dotnet restore

      - name: Build
        working-directory: src/App
        run: dotnet build -c Release --no-restore
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
