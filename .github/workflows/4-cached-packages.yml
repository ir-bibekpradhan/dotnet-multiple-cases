# Scenario 4: Cached packages (GitHub Actions cache)
# First run: cache miss — proxy sees all NuGet downloads
# Second run: cache hit — proxy should see NO downloads (packages served from cache)
# Expected: validates proxy correctly reports 0 packages on cache hit runs

name: "Scenario 4 - Cached packages"

on:
  workflow_dispatch:

jobs:
  restore-with-cache:
    runs-on: ubuntu-latest

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          app_token: ${{secrets.IR_API_KEY}}
          workdir: src/App
      # ============= InvisiRisk Setup End =============
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages + restore output
        id: nuget-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            src/App/obj
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/App.csproj') }}

      - name: Cache status
        run: |
          echo "Cache hit: ${{ steps.nuget-cache.outputs.cache-hit }}"

      - name: Restore packages (skip if cached)
        if: steps.nuget-cache.outputs.cache-hit != 'true'
        working-directory: src/App
        run: dotnet restore

      - name: Build
        working-directory: src/App
        run: dotnet build -c Release --no-restore
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
