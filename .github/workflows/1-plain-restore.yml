# Scenario 1: Plain dotnet restore (no Docker)
# Tests proxy intercepts NuGet package downloads directly on the runner
# Expected: proxy logs all 7 packages being fetched from nuget.org

name: "Scenario 1 - Plain dotnet restore"

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          app_token: ${{secrets.IR_API_KEY}}
          workdir: src/App
      # ============= InvisiRisk Setup End =============
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore packages (proxy intercepts here)
        working-directory: src/App
        run: dotnet restore

      - name: Build
        working-directory: src/App
        run: dotnet build -c Release --no-restore
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
