# Scenario 3: Multi-stage Docker build
# Tests proxy only intercepts downloads in the BUILD stage
# Runtime stage uses COPY --from — no network calls expected there
# Expected: proxy logs packages only from the builder stage, silent on runtime stage

name: "Scenario 3 - Multi-stage Docker build"

on:
  workflow_dispatch:

jobs:
  docker-multistage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-stage image
        run: |
          docker build \
            --target runtime \
            -f Dockerfile.multistage \
            -t dotnet-proxy-test:multi \
            .

      - name: Run container
        run: docker run --rm dotnet-proxy-test:multi
