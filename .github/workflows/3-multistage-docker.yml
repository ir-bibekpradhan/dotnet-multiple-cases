# Scenario 3: Multi-stage Docker build
# Tests proxy only intercepts downloads in the BUILD stage
# Runtime stage uses COPY --from — no network calls expected there
# Expected: proxy logs packages only from the builder stage, silent on runtime stage

name: "Scenario 3 - Multi-stage Docker build"

on:
  workflow_dispatch:

jobs:
  docker-multistage:
    runs-on: ubuntu-latest

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          app_token: ${{secrets.IR_API_KEY}}
          mode: docker-intercept
      # ============= InvisiRisk Setup End =============
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-stage image
        run: |
          docker build \
            --target runtime \
            -f Dockerfile.multistage \
            -t dotnet-proxy-test:multi \
            --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest \
            --secret id=pse-ca,src=/etc/ssl/certs/pse.pem \
            --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            .

      - name: Run container
        run: docker run --rm dotnet-proxy-test:multi
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
